         stop-color="#071023"
         id="stop1" />
      <stop
         offset="100%"
         stop-color="#041018"
         id="stop2" />
    </linearGradient>
    <filter
       id="softGlow"
       x="-0.027619048"
       y="-0.027619048"
       width="1.0552381"
       height="1.0552381">
      <feGaussianBlur
