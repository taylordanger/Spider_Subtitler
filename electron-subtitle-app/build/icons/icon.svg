<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#071023"/>
      <stop offset="100%" stop-color="#041018"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="32" y="32" width="960" height="960" rx="160" ry="160" fill="url(#bgGrad)" />

  <!-- hacker-style spiderweb (neon green lines) -->
  <g fill="none" stroke="#33FF99" stroke-opacity="0.88" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <!-- radial spokes -->
    <g transform="translate(512,512)">
      <g id="spokes">
        <path d="M0,0 L0,-420"/>
        <path d="M0,0 L296,-296"/>
        <path d="M0,0 L420,0"/>
        <path d="M0,0 L296,296"/>
        <path d="M0,0 L0,420"/>
        <path d="M0,0 L-296,296"/>
        <path d="M0,0 L-420,0"/>
        <path d="M0,0 L-296,-296"/>
      </g>
      <!-- concentric arcs -->
      <g id="arcs" transform="scale(1)">
        <path d="M-360,-40 A420,420 0 0,1 360,-40"/>
        <path d="M-270,-30 A330,330 0 0,1 270,-30"/>
        <path d="M-180,-20 A240,240 0 0,1 180,-20"/>
        <path d="M-90,-10 A150,150 0 0,1 90,-10"/>
      </g>
      <!-- small radial inner web -->
      <g id="inner">
        <path d="M0,-80 A120,120 0 0,1 0,80" stroke-width="6"/>
        <path d="M-60,-60 A85,85 0 0,1 60,-60" stroke-width="6"/>
      </g>
    </g>
  </g>

  <!-- subtle grid/dots for hacker texture -->
  <g fill="#33FF99" fill-opacity="0.06">
    <!-- a scattering of tiny dots -->
    <circle cx="160" cy="200" r="2"/>
    <circle cx="220" cy="420" r="2"/>
    <circle cx="860" cy="300" r="2"/>
    <circle cx="720" cy="700" r="2"/>
    <circle cx="420" cy="860" r="2"/>
    <circle cx="520" cy="120" r="2"/>
  </g>

  <!-- central closed-caption badge (dark rounded rect with CC in white) -->
  <g transform="translate(512,512)">
    <rect x="-220" y="-120" width="440" height="240" rx="40" ry="40" fill="#06121a" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" />
    <text x="-120" y="40" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="160" font-weight="700" fill="#ffffff">CC</text>
  </g>

  <!-- overlay spider thread (hand-drawn style) -->
  <path d="M760,200 C720,260 680,300 620,320 C580,330 540,340 500,360" stroke="#33FF99" stroke-opacity="0.6" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M300,760 C360,720 420,680 480,660 C520,650 560,640 600,620" stroke="#33FF99" stroke-opacity="0.5" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- final glow vignette -->
  <rect x="32" y="32" width="960" height="960" rx="160" ry="160" fill="none" stroke="#000" stroke-opacity="0.15" stroke-width="40"/>

</svg>
